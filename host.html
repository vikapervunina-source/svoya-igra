  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; }

  .screen.active { display: flex; flex-direction: column; }

  .lobby-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px; width: 600px; max-width: 95vw; }
  .lobby-logo { font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: #f5c842; letter-spacing: 3px; margin-bottom: 4px; }
  .lobby-sub { color: rgba(255,255,255,0.4); font-size: 14px; margin-bottom: 32px; }
  .link-box { background: rgba(46,204,113,0.08); border: 1px solid rgba(46,204,113,0.2); border-radius: 12px; padding: 14px 18px; margin-bottom: 28px; }
  .link-label { font-size: 11px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .link-url { font-size: 13px; color: #2ecc71; word-break: break-all; cursor: pointer; }

  .players-waiting { margin-bottom: 28px; }
  .pw-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .pw-title { font-size: 15px; font-weight: 600; }
  .pw-count { font-size: 13px; color: rgba(255,255,255,0.4); }

  .player-chip { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 50px; padding: 8px 16px; font-size: 14px; }
  .chip-dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; flex-shrink: 0; }
  .chip-remove { width: 18px; height: 18px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.5); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .chip-remove:hover { background: rgba(231,76,60,0.3); color: #ff6b6b; }
  .empty-hint { font-size: 14px; color: rgba(255,255,255,0.2); padding: 12px 0; }
  .btn-start { width: 100%; padding: 16px; background: #f5c842; color: #0a0a1a; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; }
  .btn-start:hover:not(:disabled) { opacity: 0.9; }
  .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }

  /* GAME */
  #game-screen { background: #0a0a1a; }
  .game-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
  .game-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: #f5c842; letter-spacing: 2px; }
  .round-badge { font-size: 12px; color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06); padding: 4px 12px; border-radius: 20px; }
  .status-label { font-size: 12px; color: rgba(255,255,255,0.4); display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff6b6b; }
  .status-dot.on { background: #2ecc71; }

  .scores-bar { display: flex; gap: 8px; padding: 10px 20px; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; flex-wrap: wrap; }
  .score-card { flex: 1; min-width: 90px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 8px 10px; position: relative; transition: border-color 0.3s; }
  .score-name { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .score-pts { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #fff; line-height: 1.2; }
  .score-pts.neg { color: #ff6b6b; }
  .buz-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; border-radius: 50%; background: #2ecc71; opacity: 0; }
  .buz-dot.lit { opacity: 1; }
  .strike-dot { position: absolute; top: 6px; left: 6px; width: 7px; height: 7px; border-radius: 50%; background: #ff6b6b; opacity: 0; }
  .strike-dot.lit { opacity: 1; }

  /* HORIZONTAL BOARD: categories left, points right */
  .round-tabs { display: flex; gap: 8px; padding: 10px 20px 0; flex-shrink: 0; }
  .round-tab { padding: 8px 16px; border-radius: 10px 10px 0 0; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-bottom: none; font-size: 13px; color: rgba(255,255,255,0.4); cursor: pointer; }
  .round-tab.active { background: rgba(245,200,66,0.1); border-color: rgba(245,200,66,0.25); color: #f5c842; font-weight: 600; }

  .board-wrap { flex: 1; padding: 16px 20px; overflow: auto; }
  .board { display: flex; flex-direction: column; gap: 8px; }
  .board-row { display: grid; grid-template-columns: 180px repeat(5, 1fr); gap: 8px; align-items: stretch; }
  .cat-label { background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.2); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; color: #f5c842; line-height: 1.15; }
  .q-cell { min-height: 56px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #f5c842; cursor: pointer; transition: background 0.2s, transform 0.1s; position: relative; }
  .q-cell:hover:not(.used) { background: rgba(245,200,66,0.15); border-color: rgba(245,200,66,0.4); transform: scale(1.02); }
  .q-cell.used { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.04); color: rgba(255,255,255,0.08); cursor: default; }
  .q-cell.used:hover { transform: none; }
  .q-cell.empty { visibility: hidden; }
  .trap-corner { position: absolute; top: 4px; right: 6px; font-size: 9px; opacity: 0.3; }

  /* MODALS */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .overlay.open { display: flex; }
  .modal { background: #12122a; border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 28px; width: 700px; max-width: 100%; max-height: 92vh; overflow-y: auto; }
  .modal-pts { font-family: 'Bebas Neue', sans-serif; font-size: 17px; color: #f5c842; margin-bottom: 6px; letter-spacing: 1px; }
  .modal-rules { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 14px; font-style: italic; }
  .modal-q { font-size: 20px; line-height: 1.5; color: #fff; margin-bottom: 16px; }
  .modal-img { width: 100%; max-height: 280px; object-fit: contain; border-radius: 10px; margin-bottom: 16px; background: rgba(0,0,0,0.3); }
  .attempts-row { display: flex; gap: 6px; margin-bottom: 14px; }
  .attempt-pip { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .attempt-pip.miss { background: rgba(231,76,60,0.2); border-color: rgba(231,76,60,0.4); }
  .buzz-box { background: rgba(245,200,66,0.08); border: 1px solid rgba(245,200,66,0.25); border-radius: 12px; padding: 12px 16px; margin-bottom: 14px; display: none; }
  .buzz-box.show { display: block; }
  .buzz-label { font-size: 11px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .buzz-name { font-size: 22px; font-weight: 700; color: #f5c842; }
  .ans-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 16px; margin-bottom: 18px; display: none; }
  .ans-box.show { display: block; }
  .ans-label { font-size: 11px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .ans-text { font-size: 17px; color: #2ecc71; font-weight: 600; margin-bottom: 8px; }
  .ans-img { width: 100%; max-height: 220px; object-fit: contain; border-radius: 10px; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { padding: 10px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07); color: #fff; font-size: 13px; font-family: 'Inter', sans-serif; font-weight: 500; cursor: pointer; }
  .btn:hover { background: rgba(255,255,255,0.13); }
  .btn.g { background: rgba(46,204,113,0.15); border-color: rgba(46,204,113,0.35); color: #2ecc71; }
  .btn.g:hover { background: rgba(46,204,113,0.25); }
  .btn.r { background: rgba(231,76,60,0.15); border-color: rgba(231,76,60,0.35); color: #ff6b6b; }
  .btn.r:hover { background: rgba(231,76,60,0.25); }
  .btn.y { background: rgba(245,200,66,0.12); border-color: rgba(245,200,66,0.3); color: #f5c842; }
  .btn.y:hover { background: rgba(245,200,66,0.22); }

  /* TRAP MODAL */
  .trap-modal { background: #130a20; border: 1px solid rgba(255,107,107,0.25); border-radius: 20px; padding: 32px; width: 520px; max-width: 100%; text-align: center; }
  .trap-em { font-size: 64px; margin-bottom: 12px; }
  .trap-label { font-size: 13px; color: #ff6b6b; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; margin-bottom: 4px; }
  .trap-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: #ff8c69; letter-spacing: 2px; margin-bottom: 8px; }
  .trap-desc { font-size: 15px; color: rgba(255,255,255,0.6); margin-bottom: 22px; line-height: 1.5; }
  .trap-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

  /* END */
  #end-screen { align-items: center; justify-content: center; background: radial-gradient(ellipse at 50% 30%, #1a1a0a 0%, #0a0a1a 70%); }
  .end-box { text-align: center; padding: 48px; max-width: 480px; width: 100%; }
  .end-trophy { font-size: 72px; margin-bottom: 20px; }
  .end-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: #f5c842; letter-spacing: 3px; margin-bottom: 28px; }
  .end-row { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.05); }
  .end-row.first { background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.25); }
  .end-place { font-family: 'Bebas Neue', sans-serif; font-size: 20px; width: 30px; color: rgba(255,255,255,0.35); }
  .end-row.first .end-place { color: #f5c842; }
  .end-pname { flex: 1; font-size: 16px; font-weight: 500; text-align: left; }
  .end-pts { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: #f5c842; }
  .btn-restart { margin-top: 28px; padding: 14px 32px; background: rgba(245,200,66,0.12); border: 1px solid rgba(245,200,66,0.3); border-radius: 12px; color: #f5c842; font-size: 15px; font-weight: 600; font-family: 'Inter',sans-serif; cursor: pointer; }

  .notif { position: fixed; bottom: 20px; right: 20px; background: #1a1a2e; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 14px 18px; font-size: 14px; z-index: 200; opacity: 0; transform: translateY(8px); transition: opacity 0.3s, transform 0.3s; max-width: 280px; }
  .notif.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div id="lobby-screen" class="screen active">
  <div class="lobby-box">
    <div class="lobby-logo">Своя Игра</div>
    <div class="lobby-sub">Экран ведущего</div>
    <div class="link-box">
      <div class="link-label">Ссылка для игроков</div>
      <div class="link-url" id="player-link" onclick="copyLink()">Определяется...</div>
      <div class="copy-hint">Нажми чтобы скопировать</div>
    </div>
    <div class="players-waiting">
      <div class="pw-header">
        <div class="pw-title">Игроки онлайн</div>
        <div class="pw-count" id="pw-count">0 / 8</div>
      </div>
      <div class="player-chips" id="player-chips">
        <div class="empty-hint">Никого нет — жди игроков по ссылке выше</div>
      </div>
    </div>
    <button class="btn-start" id="btn-start" onclick="startGame()" disabled>Начать игру (нужно минимум 2 игрока)</button>
  </div>
</div>

<div id="game-screen" class="screen">
  <div class="game-header">
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="game-title">Своя Игра</div>
      <div class="round-badge" id="round-badge">Раунд 1</div>
    </div>
    <div class="status-label"><span class="status-dot" id="sdot"></span><span id="stxt">Подключение...</span></div>
  </div>
  <div class="scores-bar" id="scores-bar"></div>
  <div class="round-tabs" id="round-tabs"></div>
  <div class="board-wrap"><div class="board" id="board"></div></div>
</div>

<div id="end-screen" class="screen">
  <div class="end-box">
    <div class="end-trophy">🏆</div>
    <div class="end-title">Игра окончена!</div>
    <div id="end-results"></div>
    <button class="btn-restart" onclick="location.reload()">Новая игра</button>
  </div>
</div>

<div class="overlay" id="q-overlay">
  <div class="modal">
    <div class="modal-pts" id="m-pts"></div>
    <div class="modal-rules" id="m-rules"></div>
    <div class="modal-q" id="m-q"></div>
    <img class="modal-img" id="m-img" style="display:none" alt="">
    <div class="attempts-row" id="attempts-row"></div>
    <div class="buzz-box" id="buzz-box">
      <div class="buzz-label">Сейчас отвечает</div>
      <div class="buzz-name" id="buzz-name">—</div>
    </div>
    <div class="ans-box" id="ans-box">
      <div class="ans-label">Ответ</div>
      <div class="ans-text" id="ans-text"></div>
      <img class="ans-img" id="ans-img" style="display:none" alt="">
    </div>
    <div class="actions" id="m-actions"></div>
  </div>
</div>

<div class="overlay" id="trap-overlay">
  <div class="trap-modal" id="trap-content"></div>
</div>

<div class="notif" id="notif"></div>

// ===== YANDEX DISK LINK CONVERTER =====
const yandexCache = {};
async function resolveYandexLink(url) {
  if (!url || !url.includes('disk.yandex.ru')) return url;
  if (yandexCache[url]) return yandexCache[url];
  try {
    const api = 'https://cloud-api.yandex.net/v1/disk/public/resources/download?public_key=' + encodeURIComponent(url);
    const res = await fetch(api);
    const data = await res.json();
    if (data.href) { yandexCache[url] = data.href; return data.href; }
  } catch(e) { console.warn('Yandex resolve failed', url, e); }
  return url;
}

function generateTraps() {
  const allKeys = [];
  ROUNDS_DATA.forEach(r => r.categories.forEach((cat,ci) => cat.questions.forEach((_,qi) => allKeys.push(`${r.roundNum}-${cat.category}-${qi}`))));
  for (let i=allKeys.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [allKeys[i],allKeys[j]]=[allKeys[j],allKeys[i]]; }
  const chosen = allKeys.slice(0, Math.min(7, allKeys.length));
  const map = {};
  chosen.forEach((key,i) => map[key] = TRAPS[i % TRAPS.length]);
  return map;
}

function renderBoard(rn) {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const data = ROUNDS_DATA.find(r=>r.roundNum===rn);
  if (!data) return;
  data.categories.forEach((cat) => {
    const row = document.createElement('div');
    row.className = 'board-row';
    const label = document.createElement('div');
    label.className = 'cat-label';
    label.textContent = cat.category;
    row.appendChild(label);
    const maxCols = 5;
    for (let qi=0; qi<maxCols; qi++) {
      const q = cat.questions[qi];
      const cell = document.createElement('div');
      if (!q) { cell.className='q-cell empty'; row.appendChild(cell); continue; }
      cell.className = 'q-cell';
      const cellId = `cell-${rn}-${cat.category}-${qi}`.replace(/\s/g,'_');
      cell.id = cellId;
      cell.textContent = q.points;
      const trapKey = `${rn}-${cat.category}-${qi}`;
      if (trapMap[trapKey]) {
        const tc=document.createElement('span'); tc.className='trap-corner'; tc.textContent='?'; cell.appendChild(tc);
      }
      cell.addEventListener('click', () => openQuestion(rn, cat, qi));
      row.appendChild(cell);
    }
    board.appendChild(row);
  });
}

// ===== BUZZERS LISTENER =====
function listenBuzzers() {
  onValue(ref(db,'game/buzzers'), snap => {
    const data = snap.val();
    if (!data || !currentQ) return;
    const list = Object.values(data).sort((a,b)=>a.ts-b.ts);
    // Find first presser not already attempted
    const candidate = list.find(b => !attemptedPlayers.includes(b.name));
    if (candidate && candidate.name !== activeBuzzerName && !showingAns) {
      activeBuzzerName = candidate.name;
      showActiveAnswerer();
    }
  });
  onValue(ref(db,'game/connected'), snap => {
    const n = snap.val() ? Object.keys(snap.val()).length : 0;
    document.getElementById('sdot').className='status-dot'+(n>0?' on':'');
    document.getElementById('stxt').textContent = n>0 ? `${n} онлайн` : 'Нет игроков';
  });
}

function showActiveAnswerer() {
  document.getElementById('buzz-box').classList.add('show');
  document.getElementById('buzz-name').textContent = activeBuzzerName;
  players.forEach(p => { const el=document.getElementById(`buz-${p.replace(/\s/g,'_')}`); if(el) el.classList.remove('lit'); });
  const el = document.getElementById(`buz-${activeBuzzerName.replace(/\s/g,'_')}`);
  if (el) el.classList.add('lit');
  update(ref(db,'game'), { activeAnswerer: activeBuzzerName });
  renderActions();
}

// ===== OPEN QUESTION =====
function openQuestion(rn, cat, qi) {
  const cellId = `cell-${rn}-${cat.category}-${qi}`.replace(/\s/g,'_');
  const cell = document.getElementById(cellId);
  if (cell && cell.classList.contains('used')) return;
  const q = cat.questions[qi];
  const trapKey = `${rn}-${cat.category}-${qi}`;
  const trap = trapMap[trapKey] || null;
  currentQ = { rn, cat: cat.category, rules: cat.rules, cellId, points:q.points, q:q.q, qImg:q.qImg, a:q.a, aImg:q.aImg, trap };
  attemptedPlayers = []; missCount = 0; showingAns = false; activeBuzzerName = null; lastAnswererOverride = null;
  set(ref(db,'game/buzzers'), null);
  update(ref(db,'game'), {
    currentQuestion: { cat: cat.category, rules: cat.rules, q:q.q, qImg:q.qImg||null, points:q.points, trapType: trap?trap.type:null },
    state: trap ? 'trap' : 'question',
    activeBuzzer: !trap,
    activeAnswerer: null,
    missCount: 0
  });
  if (trap) openTrapModal(trap);
  else openQModal();
}

async function openQModal() {
  document.getElementById('m-pts').textContent = `${currentQ.points} очков · ${currentQ.cat}`;
  document.getElementById('m-rules').textContent = currentQ.rules || '';
  document.getElementById('m-q').textContent = currentQ.q || '(только картинка)';
  const img = document.getElementById('m-img');
  if (currentQ.qImg) {
    img.style.display='block'; img.src = await resolveYandexLink(currentQ.qImg);
  } else img.style.display='none';
  document.getElementById('buzz-box').classList.remove('show');
  document.getElementById('ans-box').classList.remove('show');
  renderAttempts();
  renderActions();
  document.getElementById('q-overlay').classList.add('open');
}

function renderAttempts() {
  const row = document.getElementById('attempts-row');
  row.innerHTML='';
  for (let i=0;i<3;i++) {
    const pip = document.createElement('div');
    pip.className = 'attempt-pip' + (i < missCount ? ' miss' : '');
    pip.textContent = i < missCount ? '✗' : (i+1);
    row.appendChild(pip);
  }
}

function renderActions() {
  const div = document.getElementById('m-actions'); div.innerHTML='';
  if (!showingAns) {
    const responder = lastAnswererOverride || activeBuzzerName;
    if (responder) {
      const correct = document.createElement('button'); correct.className='btn g';
      correct.textContent = `✓ ${responder} прав (+${currentQ.points})`;
      correct.onclick = () => markResult(responder, true);
      div.appendChild(correct);
      const wrong = document.createElement('button'); wrong.className='btn r';
      wrong.textContent = `✗ ${responder} неправ (−${currentQ.points})`;
      wrong.onclick = () => markResult(responder, false);
      div.appendChild(wrong);
    } else {
      const hint = document.createElement('div');
      hint.style.cssText='font-size:13px;color:rgba(255,255,255,0.4);padding:8px 0;';
      hint.textContent = 'Жду нажатия кнопки от игрока...';
      div.appendChild(hint);
    }
    const showAns = document.createElement('button'); showAns.className='btn y';
    showAns.textContent='Показать ответ (досрочно)'; showAns.onclick=revealAnswer;
    div.appendChild(showAns);
  } else {
    // already revealed
  }
  const closeBtn = document.createElement('button'); closeBtn.className='btn';
  closeBtn.textContent='Закрыть вопрос'; closeBtn.onclick=closeQ;
  div.appendChild(closeBtn);
}

function markResult(player, correct) {
  if (correct) {
    scores[player] = (scores[player]||0) + currentQ.points;
    updateScores(); update(ref(db,'game'), { scores });
    notify(`${player}: +${currentQ.points}`);
    closeQ();
  } else {
    scores[player] = (scores[player]||0) - currentQ.points;
    updateScores(); update(ref(db,'game'), { scores });
    notify(`${player}: −${currentQ.points}`);
    attemptedPlayers.push(player);
    missCount++;
    activeBuzzerName = null;
    lastAnswererOverride = null;
    renderAttempts();
    document.getElementById('buzz-box').classList.remove('show');
    set(ref(db,'game/buzzers'), null);
    update(ref(db,'game'), { activeAnswerer:null, missCount, attemptedPlayers });
    if (missCount >= 3 || attemptedPlayers.length >= players.length) {
      revealAnswer();
    } else {
      update(ref(db,'game'), { activeBuzzer:true });
      renderActions();
    }
  }
}

async function revealAnswer() {
  showingAns = true;
  document.getElementById('ans-text').textContent = currentQ.a || '(см. картинку)';
  const aimg = document.getElementById('ans-img');
  if (currentQ.aImg) { aimg.style.display='block'; aimg.src = await resolveYandexLink(currentQ.aImg); } else aimg.style.display='none';
  document.getElementById('ans-box').classList.add('show');
  update(ref(db,'game'), { activeBuzzer:false });
  renderActions();
}

function closeQ() {
  if (currentQ) { const cell=document.getElementById(currentQ.cellId); if(cell) cell.classList.add('used'); }
  document.getElementById('q-overlay').classList.remove('open');
  document.getElementById('trap-overlay').classList.remove('open');
  set(ref(db,'game/buzzers'), null);
  update(ref(db,'game'), { state:'board', currentQuestion:null, activeBuzzer:false, activeAnswerer:null });
  currentQ=null; activeBuzzerName=null; attemptedPlayers=[]; missCount=0; showingAns=false; lastAnswererOverride=null;
  players.forEach(p => { const el=document.getElementById(`buz-${p.replace(/\s/g,'_')}`); if(el) el.classList.remove('lit'); });
  checkRoundEnd();
}

// ===== TRAP MODAL =====
function openTrapModal(trap) {
  const c = document.getElementById('trap-content');
  let html = `<div class="trap-em">${trap.emoji}</div><div class="trap-label">⚠ Ловушка!</div><div class="trap-title">${trap.name}</div><div class="trap-desc">${trap.desc}</div>`;
  if (trap.type==='compliment' || trap.type==='luck') {
    html += `<div class="trap-btns">
      <button class="btn g" onclick="trapGiveScore(null,1000,true)">Засчитано (+1000)</button>
      ${trap.type==='compliment' ? '<button class="btn r" onclick="closeQ()">Не засчитано</button>' : ''}
    </div>`;
  } else if (trap.type==='warmup') {
    html += `<div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:12px;">Кто выбрал вопрос?</div><div class="trap-btns">`;
    players.forEach(p => html += `<button class="btn" onclick="doWarmup('${p}')">${p}</button>`);
    html += `</div>`;
  } else if (trap.type==='flip') {
    html += `<div class="trap-btns"><button class="btn y" onclick="doFlip()">Поменять знаки у всех</button></div>`;
  } else if (trap.type==='underdog') {
    const minScore = Math.min(...players.map(p=>scores[p]));
    const underdog = players.find(p=>scores[p]===minScore);
    html += `<div style="font-size:28px;font-weight:700;color:#f5c842;margin-bottom:20px;">${underdog}</div>
      <div class="trap-btns"><button class="btn y" onclick="doUnderdog('${underdog}')">Задать вопрос</button><button class="btn" onclick="closeQ()">Закрыть</button></div>`;
  } else if (trap.type==='luxury_tax') {
    html += `<div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:12px;">Кто выбрал вопрос?</div><div class="trap-btns">`;
    players.forEach(p => html += `<button class="btn r" onclick="doLuxuryTax('${p}')">${p} −500</button>`);
    html += `</div>`;
  } else if (trap.type==='bonus_gift') {
    html += `<div class="trap-btns">`;
    players.forEach(p => html += `<button class="btn g" onclick="trapGiveScore('${p}',500,true)">${p} +500</button>`);
    html += `</div>`;
  }
  html += `<div style="margin-top:14px;"><button class="btn" onclick="closeQ()">Отмена / Закрыть</button></div>`;
  c.innerHTML = html;
  document.getElementById('trap-overlay').classList.add('open');
}

window.trapGiveScore = function(player, amount, close) {
  if (player) { scores[player] = (scores[player]||0) + amount; }
  updateScores(); update(ref(db,'game'), { scores });
  notify(player ? `${player}: +${amount}` : `+${amount} начислено`);
  if (close) closeQ();
};
window.doWarmup = function(chooser) {
  const minScore = Math.min(...players.map(p=>scores[p]));
  const target = players.find(p=>scores[p]===minScore && p!==chooser) || players.find(p=>scores[p]===minScore);
  scores[chooser] = (scores[chooser]||0) - 1000;
  scores[target] = (scores[target]||0) + 1000;
  updateScores(); update(ref(db,'game'), { scores });
  notify(`${chooser} → ${target}: 1000 баллов`);
  closeQ();
};
window.doFlip = function() {
  players.forEach(p => scores[p] = -scores[p]);
  updateScores(); update(ref(db,'game'), { scores });
  notify('Все знаки очков изменены!');
  closeQ();
};
window.doUnderdog = function(target) {
  document.getElementById('trap-overlay').classList.remove('open');
  lastAnswererOverride = target;
  openQModal();
  update(ref(db,'game'), { state:'question', activeBuzzer:false });
};
window.doLuxuryTax = function(chooser) {
  scores[chooser] = (scores[chooser]||0) - 500;
  updateScores(); update(ref(db,'game'), { scores });
  notify(`${chooser}: −500`);
  closeQ();
};

// ===== ROUND/GAME END =====
function checkRoundEnd() {
  const data = ROUNDS_DATA.find(r=>r.roundNum===currentRound);
  const total = data.categories.reduce((s,c)=>s+c.questions.length,0);
  const used = document.querySelectorAll('.q-cell.used').length;
  // count used cells only within visible board (current round) roughly
  const usedInRound = Array.from(document.querySelectorAll('.q-cell.used')).filter(el=>el.id.startsWith(`cell-${currentRound}-`)).length;
  if (usedInRound >= total) {
    const isLast = currentRound === ROUNDS_DATA[ROUNDS_DATA.length-1].roundNum;
    if (isLast) setTimeout(showEnd, 800);
    else notify(`Раунд ${currentRound} завершён! Переключи на следующий раунд.`);
  }
}

function showEnd() {
  const sorted=[...players].sort((a,b)=>scores[b]-scores[a]);
  const medals=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣'];
  document.getElementById('end-results').innerHTML = sorted.map((p,i)=>`<div class="end-row ${i===0?'first':''}"><div class="end-place">${medals[i]}</div><div class="end-pname">${p}</div><div class="end-pts">${scores[p]}</div></div>`).join('');
  showScreen('end-screen'); update(ref(db,'game'), { state:'end' });
}

function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function notify(msg) { const el=document.getElementById('notif'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500); }

});
</script>
