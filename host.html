<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Своя Игра — Ведущий</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; }
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* LOBBY */
  #lobby-screen { align-items: center; justify-content: center; background: radial-gradient(ellipse at 50% 0%, #1a0a3a 0%, #0a0a1a 70%); }
  .lobby-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px; width: 600px; max-width: 95vw; }
  .lobby-logo { font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: #f5c842; letter-spacing: 3px; margin-bottom: 4px; }
  .lobby-sub { color: rgba(255,255,255,0.4); font-size: 14px; margin-bottom: 32px; }
  .link-box { background: rgba(46,204,113,0.08); border: 1px solid rgba(46,204,113,0.2); border-radius: 12px; padding: 14px 18px; margin-bottom: 28px; }
  .link-label { font-size: 11px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .link-url { font-size: 13px; color: #2ecc71; word-break: break-all; cursor: pointer; }
  .copy-hint { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 4px; }
  .players-waiting { margin-bottom: 28px; }
  .pw-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .pw-title { font-size: 15px; font-weight: 600; }
  .pw-count { font-size: 13px; color: rgba(255,255,255,0.4); }
  .player-chips { display: flex; flex-wrap: wrap; gap: 10px; min-height: 48px; }
  .player-chip { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 50px; padding: 8px 16px; font-size: 14px; animation: chipIn 0.3s ease; }
  @keyframes chipIn { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }
  .chip-dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; flex-shrink: 0; }
  .chip-remove { width: 18px; height: 18px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.5); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .chip-remove:hover { background: rgba(231,76,60,0.3); color: #ff6b6b; }
  .empty-hint { font-size: 14px; color: rgba(255,255,255,0.2); padding: 12px 0; }
  .btn-start { width: 100%; padding: 16px; background: #f5c842; color: #0a0a1a; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
  .btn-start:hover:not(:disabled) { opacity: 0.9; }
  .btn-start:active:not(:disabled) { transform: scale(0.98); }
  .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }

  /* GAME */
  #game-screen { background: #0a0a1a; }
  .game-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
  .game-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #f5c842; letter-spacing: 2px; }
  .status-label { font-size: 12px; color: rgba(255,255,255,0.4); display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff6b6b; }
  .status-dot.on { background: #2ecc71; }

  .scores-bar { display: flex; gap: 10px; padding: 12px 24px; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; flex-wrap: wrap; }
  .score-card { flex: 1; min-width: 100px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 12px; position: relative; transition: border-color 0.3s; }
  .score-name { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .score-pts { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: #fff; line-height: 1; }
  .score-pts.neg { color: #ff6b6b; }
  .buz-dot { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; opacity: 0; transition: opacity 0.3s; }
  .buz-dot.lit { opacity: 1; animation: bpulse 0.4s ease; }
  @keyframes bpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.8)} }

  .board-wrap { flex: 1; padding: 16px 24px; overflow: auto; }
  .board { display: grid; gap: 8px; }
  .cat-hdr { background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.2); border-radius: 10px; padding: 10px 14px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1.5px; color: #f5c842; text-align: center; }
  .q-cell { aspect-ratio: 1.6; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: #f5c842; cursor: pointer; transition: background 0.2s, transform 0.1s; position: relative; }
  .q-cell:hover:not(.used) { background: rgba(245,200,66,0.15); border-color: rgba(245,200,66,0.4); transform: scale(1.03); }
  .q-cell.used { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.04); color: rgba(255,255,255,0.08); cursor: default; }
  .q-cell.used:hover { transform: none; }
  .trap-corner { position: absolute; top: 4px; right: 6px; font-size: 10px; opacity: 0.35; }

  /* MODALS */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 100; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: #12122a; border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 32px; width: 680px; max-width: 95vw; max-height: 92vh; overflow-y: auto; }
  .modal-pts { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #f5c842; margin-bottom: 6px; letter-spacing: 1px; }
  .modal-q { font-size: 21px; line-height: 1.5; color: #fff; margin-bottom: 18px; }
  .modal-img { width: 100%; max-height: 260px; object-fit: contain; border-radius: 10px; margin-bottom: 16px; background: rgba(0,0,0,0.3); }
  .buzz-box { background: rgba(245,200,66,0.08); border: 1px solid rgba(245,200,66,0.25); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; display: none; }
  .buzz-box.show { display: block; }
  .buzz-label { font-size: 11px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .buzz-name { font-size: 22px; font-weight: 700; color: #f5c842; }
  .buzz-next { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 6px; }
  .ans-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; display: none; }
  .ans-box.show { display: block; }
  .ans-label { font-size: 11px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .ans-text { font-size: 18px; color: #2ecc71; font-weight: 600; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { padding: 10px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07); color: #fff; font-size: 13px; font-family: 'Inter', sans-serif; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: rgba(255,255,255,0.13); }
  .btn.g { background: rgba(46,204,113,0.15); border-color: rgba(46,204,113,0.35); color: #2ecc71; }
  .btn.g:hover { background: rgba(46,204,113,0.25); }
  .btn.r { background: rgba(231,76,60,0.15); border-color: rgba(231,76,60,0.35); color: #ff6b6b; }
  .btn.r:hover { background: rgba(231,76,60,0.25); }
  .btn.y { background: rgba(245,200,66,0.12); border-color: rgba(245,200,66,0.3); color: #f5c842; }
  .btn.y:hover { background: rgba(245,200,66,0.22); }

  /* TRAP MODAL */
  .trap-modal { background: #130a20; border: 1px solid rgba(255,107,107,0.25); border-radius: 20px; padding: 36px; width: 520px; max-width: 95vw; text-align: center; }
  .trap-em { font-size: 72px; margin-bottom: 14px; }
  .trap-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: #ff8c69; letter-spacing: 2px; margin-bottom: 8px; }
  .trap-desc { font-size: 16px; color: rgba(255,255,255,0.6); margin-bottom: 24px; line-height: 1.5; }
  .trap-sel { width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 12px 14px; color: #fff; font-size: 15px; font-family: 'Inter',sans-serif; outline: none; margin-bottom: 16px; cursor: pointer; }
  .auction-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .auction-row { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 10px 14px; }
  .auction-row-name { flex: 1; font-size: 14px; text-align: left; }
  .auction-row input { width: 90px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 7px 10px; color: #fff; font-size: 14px; font-family: 'Inter',sans-serif; outline: none; text-align: right; }
  .trap-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

  /* END */
  #end-screen { align-items: center; justify-content: center; background: radial-gradient(ellipse at 50% 30%, #1a1a0a 0%, #0a0a1a 70%); }
  .end-box { text-align: center; padding: 48px; max-width: 480px; width: 100%; }
  .end-trophy { font-size: 72px; margin-bottom: 20px; }
  .end-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: #f5c842; letter-spacing: 3px; margin-bottom: 28px; }
  .end-row { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.05); }
  .end-row.first { background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.25); }
  .end-place { font-family: 'Bebas Neue', sans-serif; font-size: 20px; width: 30px; color: rgba(255,255,255,0.35); }
  .end-row.first .end-place { color: #f5c842; }
  .end-pname { flex: 1; font-size: 16px; font-weight: 500; text-align: left; }
  .end-pts { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: #f5c842; }
  .btn-restart { margin-top: 28px; padding: 14px 32px; background: rgba(245,200,66,0.12); border: 1px solid rgba(245,200,66,0.3); border-radius: 12px; color: #f5c842; font-size: 15px; font-weight: 600; font-family: 'Inter',sans-serif; cursor: pointer; }
  .btn-restart:hover { background: rgba(245,200,66,0.22); }

  .notif { position: fixed; bottom: 20px; right: 20px; background: #1a1a2e; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 14px 18px; font-size: 14px; z-index: 200; opacity: 0; transform: translateY(8px); transition: opacity 0.3s, transform 0.3s; max-width: 280px; }
  .notif.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby-screen" class="screen active">
  <div class="lobby-box">
    <div class="lobby-logo">Своя Игра</div>
    <div class="lobby-sub">Экран ведущего</div>

    <div class="link-box">
      <div class="link-label">Ссылка для игроков</div>
      <div class="link-url" id="player-link" onclick="copyLink()">Определяется...</div>
      <div class="copy-hint">Нажми чтобы скопировать</div>
    </div>

    <div class="players-waiting">
      <div class="pw-header">
        <div class="pw-title">Игроки онлайн</div>
        <div class="pw-count" id="pw-count">0 / 8</div>
      </div>
      <div class="player-chips" id="player-chips">
        <div class="empty-hint">Никого нет — жди игроков по ссылке выше</div>
      </div>
    </div>

    <button class="btn-start" id="btn-start" onclick="startGame()" disabled>
      Начать игру (нужно минимум 2 игрока)
    </button>
  </div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <div class="game-title">Своя Игра</div>
    <div class="status-label">
      <span class="status-dot" id="sdot"></span>
      <span id="stxt">Подключение...</span>
    </div>
  </div>
  <div class="scores-bar" id="scores-bar"></div>
  <div class="board-wrap"><div class="board" id="board"></div></div>
</div>

<!-- END -->
<div id="end-screen" class="screen">
  <div class="end-box">
    <div class="end-trophy">🏆</div>
    <div class="end-title">Игра окончена!</div>
    <div id="end-results"></div>
    <button class="btn-restart" onclick="location.reload()">Новая игра</button>
  </div>
</div>

<!-- Q MODAL -->
<div class="overlay" id="q-overlay">
  <div class="modal">
    <div class="modal-pts" id="m-pts"></div>
    <div class="modal-q" id="m-q"></div>
    <img class="modal-img" id="m-img" style="display:none" alt="">
    <div class="buzz-box" id="buzz-box">
      <div class="buzz-label">Нажал первым</div>
      <div class="buzz-name" id="buzz-name">—</div>
      <div class="buzz-next" id="buzz-next"></div>
    </div>
    <div class="ans-box" id="ans-box">
      <div class="ans-label">Ответ</div>
      <div class="ans-text" id="ans-text"></div>
    </div>
    <div class="actions" id="m-actions"></div>
  </div>
</div>

<!-- TRAP MODAL -->
<div class="overlay" id="trap-overlay">
  <div class="trap-modal" id="trap-content"></div>
</div>

<div class="notif" id="notif"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, push, update, remove, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB = {
  apiKey: "AIzaSyDYPT9DXK5nVDutohOxORgAUWSLzpApevE",
  authDomain: "my-game-d513c.firebaseapp.com",
  databaseURL: "https://my-game-d513c-default-rtdb.firebaseio.com",
  projectId: "my-game-d513c",
  storageBucket: "my-game-d513c.firebasestorage.app",
  messagingSenderId: "96446253861",
  appId: "1:96446253861:web:356e3f19773f72bd1ca8cc"
};
const app = initializeApp(FB);
const db = getDatabase(app);

// ===== QUESTIONS =====
const QUESTIONS = [
  { category: "История", questions: [
    { points:100, q:"В каком году началась Вторая мировая война?", a:"1939" },
    { points:200, q:"Кто был первым президентом США?", a:"Джордж Вашингтон" },
    { points:300, q:"В каком году пала Берлинская стена?", a:"1989" },
    { points:400, q:"В каком году был подписан Брестский мир?", a:"1918" },
    { points:500, q:"Назовите самую длинную войну в истории человечества.", a:"Столетняя война (1337–1453)" }
  ]},
  { category: "Наука", questions: [
    { points:100, q:"Что такое H₂O?", a:"Вода" },
    { points:200, q:"Сколько планет в Солнечной системе?", a:"8" },
    { points:300, q:"Какой элемент обозначается символом Au?", a:"Золото" },
    { points:400, q:"Какова скорость света в вакууме?", a:"≈ 300 000 км/с" },
    { points:500, q:"Что изучает эпигенетика?", a:"Изменения экспрессии генов без изменения ДНК" }
  ]},
  { category: "Кино", questions: [
    { points:100, q:"Кто снял «Интерстеллар»?", a:"Кристофер Нолан" },
    { points:200, q:"В каком году вышел первый фильм о Гарри Поттере?", a:"2001" },
    { points:300, q:"Как звали робота в «ВАЛЛ-И»?", a:"ВАЛЛ-И" },
    { points:400, q:"В каком городе разворачивается «Крёстный отец»?", a:"Нью-Йорк" },
    { points:500, q:"Назовите первый фильм, получивший «Оскар» за лучший фильм.", a:"Крылья (1927/28)" }
  ]},
  { category: "Спорт", questions: [
    { points:100, q:"Сколько игроков в команде в баскетболе?", a:"5" },
    { points:200, q:"В какой стране придумали футбол?", a:"Англия" },
    { points:300, q:"Как называется главный приз Лиги чемпионов УЕФА?", a:"Кубок европейских чемпионов (Ухо)" },
    { points:400, q:"Кто держит рекорд по титулам чемпиона мира Формулы-1?", a:"Льюис Хэмилтон и Михаэль Шумахер (по 7)" },
    { points:500, q:"В каком году Бразилия впервые выиграла чемпионат мира по футболу?", a:"1958" }
  ]},
  { category: "Культура", questions: [
    { points:100, q:"Кто написал «Война и мир»?", a:"Лев Толстой" },
    { points:200, q:"В каком музее хранится «Джоконда»?", a:"Лувр, Париж" },
    { points:300, q:"Сколько симфоний написал Бетховен?", a:"9" },
    { points:400, q:"Кто автор картины «Крик»?", a:"Эдвард Мунк" },
    { points:500, q:"Как звали сестёр Элизабет Беннет в «Гордости и предубеждении»?", a:"Джейн, Мэри, Китти, Лидия" }
  ]}
];

const TRAPS = [
  { type:"transfer", emoji:"🔀", name:"Передай вопрос",       desc:"Ты должен передать вопрос другому игроку." },
  { type:"auction",  emoji:"💰", name:"Аукцион",              desc:"Все делают ставки! Кто больше — тот отвечает." },
  { type:"bag",      emoji:"🎁", name:"Кот в мешке",          desc:"Вопрос уходит случайному игроку автоматически!" },
  { type:"minus",    emoji:"💀", name:"Чёрная метка",         desc:"Кому-то спишут −1000 баллов." },
  { type:"gift",     emoji:"🌟", name:"Невиданная щедрость",  desc:"Кому-то начислят +1500 баллов!" }
];

let players = [];
let scores = {};
let trapMap = {};
let currentQ = null;
let buzzers = [];
let showingAns = false;
let auctionWinner = null;
let transferTarget = null;

// ===== LOBBY =====
function setPlayerLink() {
  const url = window.location.href.replace('host.html','player.html');
  const el = document.getElementById('player-link');
  el.textContent = url;
  el._url = url;
}
setPlayerLink();
window.copyLink = () => {
  const el = document.getElementById('player-link');
  navigator.clipboard.writeText(el._url).then(() => notify('Ссылка скопирована!'));
};

onValue(ref(db,'game/connected'), snap => {
  const data = snap.val() || {};
  const names = Object.values(data).map(d => d.name).filter(Boolean);
  renderChips(names);
  const btn = document.getElementById('btn-start');
  btn.disabled = names.length < 2;
  btn.textContent = names.length < 2
    ? `Начать игру (нужно минимум 2 игрока)`
    : `Начать игру — ${names.length} игрок${names.length===1?'':names.length<5?'а':'ов'}`;
});

function renderChips(names) {
  const wrap = document.getElementById('player-chips');
  document.getElementById('pw-count').textContent = `${names.length} / 8`;
  if (!names.length) {
    wrap.innerHTML = '<div class="empty-hint">Никого нет — жди игроков по ссылке выше</div>';
    return;
  }
  wrap.innerHTML = names.map(n => `
    <div class="player-chip">
      <div class="chip-dot"></div>
      <span>${n}</span>
      <button class="chip-remove" onclick="kickPlayer('${n}')" title="Удалить">×</button>
    </div>`).join('');
}

window.kickPlayer = function(name) {
  const key = name.replace(/\s/g,'_');
  remove(ref(db, `game/connected/${key}`));
};

window.startGame = function() {
  get(ref(db,'game/connected')).then(snap => {
    const data = snap.val() || {};
    players = Object.values(data).map(d => d.name).filter(Boolean);
    if (players.length < 2) return;
    players.forEach(p => scores[p] = 0);
    trapMap = generateTraps();
    set(ref(db,'game'), {
      state: 'board',
      players,
      scores,
      connected: data,
      currentQuestion: null,
      buzzers: null,
      activeBuzzer: false
    });
    showScreen('game-screen');
    renderBoard();
    renderScores();
    listenBuzzers();
  });
};

function generateTraps() {
  const all = [];
  QUESTIONS.forEach((cat,ci) => cat.questions.forEach((_,qi) => all.push(`${ci}-${qi}`)));
  for (let i = all.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [all[i],all[j]]=[all[j],all[i]]; }
  const chosen = all.slice(0,5);
  const map = {};
  chosen.forEach((key,i) => map[key] = TRAPS[i]);
  return map;
}

// ===== BOARD =====
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  board.style.gridTemplateColumns = `repeat(${QUESTIONS.length},1fr)`;
  QUESTIONS.forEach(cat => {
    const h = document.createElement('div');
    h.className = 'cat-hdr'; h.textContent = cat.category;
    board.appendChild(h);
  });
  const maxQ = Math.max(...QUESTIONS.map(c=>c.questions.length));
  for (let qi=0; qi<maxQ; qi++) {
    QUESTIONS.forEach((cat,ci) => {
      const q = cat.questions[qi];
      if (!q) { board.appendChild(document.createElement('div')); return; }
      const cell = document.createElement('div');
      cell.className = 'q-cell';
      cell.id = `cell-${ci}-${qi}`;
      cell.textContent = q.points;
      if (trapMap[`${ci}-${qi}`]) {
        const tc = document.createElement('span');
        tc.className='trap-corner'; tc.textContent='?';
        cell.appendChild(tc);
      }
      cell.addEventListener('click', () => openQuestion(ci,qi));
      board.appendChild(cell);
    });
  }
}

// ===== SCORES =====
function renderScores() {
  const bar = document.getElementById('scores-bar');
  bar.innerHTML = '';
  players.forEach(p => {
    const k = p.replace(/\s/g,'_');
    const c = document.createElement('div');
    c.className='score-card'; c.id=`sc-${k}`;
    c.innerHTML=`<div class="score-name">${p}</div><div class="score-pts" id="pts-${k}">${scores[p]}</div><div class="buz-dot" id="buz-${k}"></div>`;
    bar.appendChild(c);
  });
}

function updateScores() {
  players.forEach(p => {
    const k=p.replace(/\s/g,'_');
    const el=document.getElementById(`pts-${k}`);
    if (el) { el.textContent=scores[p]; el.className='score-pts'+(scores[p]<0?' neg':''); }
  });
}

// ===== BUZZERS =====
function listenBuzzers() {
  onValue(ref(db,'game/buzzers'), snap => {
    const data = snap.val();
    if (!data) { buzzers=[]; clearBuzUI(); return; }
    buzzers = Object.values(data).sort((a,b)=>a.ts-b.ts);
    if (buzzers.length && currentQ && !showingAns) showBuzResult();
  });
  onValue(ref(db,'game/connected'), snap => {
    const n = snap.val() ? Object.keys(snap.val()).length : 0;
    document.getElementById('sdot').className='status-dot'+(n>0?' on':'');
    document.getElementById('stxt').textContent = n>0 ? `${n} онлайн` : 'Нет игроков';
  });
}

function clearBuzUI() {
  players.forEach(p => { const el=document.getElementById(`buz-${p.replace(/\s/g,'_')}`); if(el) el.classList.remove('lit'); });
}

function showBuzResult() {
  document.getElementById('buzz-box').classList.add('show');
  document.getElementById('buzz-name').textContent = buzzers[0].name;
  document.getElementById('buzz-next').textContent = buzzers.length>1 ? 'Далее: '+buzzers.slice(1).map(b=>b.name).join(' → ') : '';
  clearBuzUI();
  const el=document.getElementById(`buz-${buzzers[0].name.replace(/\s/g,'_')}`);
  if(el) el.classList.add('lit');
  renderActions();
}

// ===== OPEN QUESTION =====
function openQuestion(ci,qi) {
  const cell=document.getElementById(`cell-${ci}-${qi}`);
  if (cell && cell.classList.contains('used')) return;
  const cat=QUESTIONS[ci], q=cat.questions[qi];
  const trap=trapMap[`${ci}-${qi}`]||null;
  currentQ={ci,qi,cat:cat.category,q:q.q,a:q.a,points:q.points,image:q.image||null,trap};
  buzzers=[]; showingAns=false; auctionWinner=null; transferTarget=null;
  set(ref(db,'game/buzzers'),null);
  update(ref(db,'game'),{
    currentQuestion:{cat:cat.category,q:q.q,points:q.points,image:q.image||null,trapType:trap?trap.type:null},
    state: trap?'trap':'question',
    activeBuzzer: !trap
  });
  if (trap) openTrapModal(trap);
  else openQModal();
}

function openQModal() {
  document.getElementById('m-pts').textContent = `${currentQ.points} очков · ${currentQ.cat}`;
  document.getElementById('m-q').textContent = currentQ.q;
  const img=document.getElementById('m-img');
  if (currentQ.image) { img.src=currentQ.image; img.style.display='block'; } else img.style.display='none';
  document.getElementById('buzz-box').classList.remove('show');
  document.getElementById('ans-box').classList.remove('show');
  renderActions();
  document.getElementById('q-overlay').classList.add('open');
}

function renderActions() {
  const div=document.getElementById('m-actions'); div.innerHTML='';
  if (!showingAns) {
    const b=document.createElement('button'); b.className='btn y'; b.textContent='Показать ответ'; b.onclick=revealAns; div.appendChild(b);
  } else {
    const resp=auctionWinner||transferTarget||(buzzers.length?buzzers[0].name:null);
    if (resp) {
      const bc=document.createElement('button'); bc.className='btn g';
      bc.textContent=`✓ ${resp} прав (+${currentQ.points})`; bc.onclick=()=>applyScore(resp,currentQ.points); div.appendChild(bc);
      const br=document.createElement('button'); br.className='btn r';
      br.textContent=`✗ ${resp} неправ (−${currentQ.points})`; br.onclick=()=>applyScore(resp,-currentQ.points); div.appendChild(br);
    }
    if (buzzers.length>1) {
      const nb=document.createElement('button'); nb.className='btn';
      nb.textContent=`Отвечает ${buzzers[1].name}`; nb.onclick=()=>{ buzzers.shift(); showBuzResult(); }; div.appendChild(nb);
    }
  }
  const sb=document.createElement('button'); sb.className='btn'; sb.textContent='Закрыть вопрос'; sb.onclick=closeQ; div.appendChild(sb);
}

function revealAns() {
  showingAns=true;
  document.getElementById('ans-text').textContent=currentQ.a;
  document.getElementById('ans-box').classList.add('show');
  renderActions();
}

function applyScore(p,delta) {
  scores[p]=(scores[p]||0)+delta;
  updateScores(); update(ref(db,'game'),{scores});
  closeQ(); notify(`${p}: ${delta>0?'+':''}${delta}`);
}

function closeQ() {
  if (currentQ) { const cell=document.getElementById(`cell-${currentQ.ci}-${currentQ.qi}`); if(cell) cell.classList.add('used'); }
  document.getElementById('q-overlay').classList.remove('open');
  document.getElementById('trap-overlay').classList.remove('open');
  set(ref(db,'game/buzzers'),null);
  update(ref(db,'game'),{state:'board',currentQuestion:null,activeBuzzer:false});
  currentQ=null; buzzers=[]; auctionWinner=null; transferTarget=null; showingAns=false; clearBuzUI();
  checkEnd();
}

// ===== TRAP MODAL =====
function openTrapModal(trap) {
  const c=document.getElementById('trap-content');
  let html=`<div class="trap-em">${trap.emoji}</div><div class="trap-title">${trap.name}</div><div class="trap-desc">${trap.desc}</div>`;
  if (trap.type==='transfer') {
    const opts=players.map(p=>`<option>${p}</option>`).join('');
    html+=`<select class="trap-sel" id="tsel">${opts}</select>
      <div class="trap-btns"><button class="btn y" onclick="doTransfer()">Передать вопрос</button><button class="btn" onclick="closeQ()">Отмена</button></div>`;
  } else if (trap.type==='auction') {
    html+=`<div class="auction-rows">`;
    players.forEach(p=>{ html+=`<div class="auction-row"><div class="auction-row-name">${p} (${scores[p]})</div><input type="number" id="bid-${p.replace(/\s/g,'_')}" placeholder="Ставка" min="0"></div>`; });
    html+=`</div><div class="trap-btns"><button class="btn y" onclick="doAuction()">Определить победителя</button><button class="btn" onclick="closeQ()">Отмена</button></div>`;
  } else if (trap.type==='bag') {
    const rand=players[Math.floor(Math.random()*players.length)];
    transferTarget=rand;
    html+=`<div style="font-size:30px;font-weight:700;color:#f5c842;margin-bottom:20px;">${rand}</div>
      <div class="trap-btns"><button class="btn y" onclick="doBag()">Задать вопрос</button><button class="btn" onclick="closeQ()">Закрыть</button></div>`;
  } else if (trap.type==='minus') {
    html+=`<div class="trap-btns" style="flex-wrap:wrap;">`;
    players.forEach(p=>{ html+=`<button class="btn r" onclick="doTrapScore('${p}',-1000)">${p} −1000</button>`; });
    html+=`<button class="btn" onclick="closeQ()">Отмена</button></div>`;
  } else if (trap.type==='gift') {
    html+=`<div class="trap-btns" style="flex-wrap:wrap;">`;
    players.forEach(p=>{ html+=`<button class="btn g" onclick="doTrapScore('${p}',1500)">${p} +1500</button>`; });
    html+=`<button class="btn" onclick="closeQ()">Отмена</button></div>`;
  }
  c.innerHTML=html;
  document.getElementById('trap-overlay').classList.add('open');
}

window.doTransfer=()=>{ transferTarget=document.getElementById('tsel').value; document.getElementById('trap-overlay').classList.remove('open'); document.getElementById('buzz-box').classList.add('show'); document.getElementById('buzz-name').textContent=transferTarget; document.getElementById('buzz-next').textContent=''; openQModal(); update(ref(db,'game'),{state:'question',activeBuzzer:false}); };
window.doAuction=()=>{ let max=-1,winner=null; players.forEach(p=>{ const v=parseInt(document.getElementById(`bid-${p.replace(/\s/g,'_')}`).value)||0; if(v>max){max=v;winner=p;} }); auctionWinner=winner; document.getElementById('trap-overlay').classList.remove('open'); document.getElementById('buzz-box').classList.add('show'); document.getElementById('buzz-name').textContent=`${winner} (ставка ${max})`; document.getElementById('buzz-next').textContent=''; openQModal(); update(ref(db,'game'),{state:'question',activeBuzzer:false}); };
window.doBag=()=>{ document.getElementById('trap-overlay').classList.remove('open'); document.getElementById('buzz-box').classList.add('show'); document.getElementById('buzz-name').textContent=transferTarget; document.getElementById('buzz-next').textContent=''; openQModal(); update(ref(db,'game'),{state:'question',activeBuzzer:false}); };
window.doTrapScore=(p,d)=>{ scores[p]=(scores[p]||0)+d; updateScores(); update(ref(db,'game'),{scores}); closeQ(); notify(`${p}: ${d>0?'+':''}${d}`); };

// ===== END =====
function checkEnd() {
  const total=QUESTIONS.reduce((s,c)=>s+c.questions.length,0);
  const used=document.querySelectorAll('.q-cell.used').length;
  if (used>=total) setTimeout(showEnd,800);
}
function showEnd() {
  const sorted=[...players].sort((a,b)=>scores[b]-scores[a]);
  const medals=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣'];
  document.getElementById('end-results').innerHTML=sorted.map((p,i)=>`<div class="end-row ${i===0?'first':''}"><div class="end-place">${medals[i]}</div><div class="end-pname">${p}</div><div class="end-pts">${scores[p]}</div></div>`).join('');
  showScreen('end-screen'); update(ref(db,'game'),{state:'end'});
}

function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function notify(msg) { const el=document.getElementById('notif'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500); }
</script>
</body>
</html>
